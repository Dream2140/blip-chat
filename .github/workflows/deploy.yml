name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'packages/web/') || contains(github.event.head_commit.modified, 'packages/shared/')
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          cd packages/web
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-ws:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'packages/ws/') || contains(github.event.head_commit.modified, 'packages/shared/')
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          cd packages/ws
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
